<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patchwork — Fix your code</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f13;
      color: #e8e6e1;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      padding-bottom: 60px;
    }
    header {
      border-bottom: 1px solid #1e1e28;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      background: linear-gradient(135deg, #e8613a, #c94b2b);
      border-radius: 8px;
      padding: 6px 10px;
      font-weight: 800;
      font-size: 14px;
    }
    .badge {
      margin-left: auto;
      font-size: 11px;
      color: #555;
      background: #1a1a22;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: monospace;
    }
    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 20px 0;
    }
    h1 {
      font-size: clamp(26px, 6vw, 40px);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 60%, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.sub {
      color: #666;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    select {
      background: #1a1a22;
      border: 1px solid #2a2a35;
      color: #e8e6e1;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      margin-bottom: 20px;
      outline: none;
      min-width: 180px;
    }
    textarea {
      width: 100%;
      background: #13131a;
      border: 1px solid #2a2a35;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #e8613a; }
    #codeInput { color: #c8ffc8; }
    #errorInput { color: #ffb3b3; }
    button#fixBtn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #e8613a, #c94b2b);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 32px;
    }
    button#fixBtn:disabled {
      background: #2a2a35;
      color: #555;
      cursor: not-allowed;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, #e8613a33, transparent);
      margin-bottom: 28px;
    }
    .result-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .copy-btn {
      background: none;
      border: 1px solid #2a2a35;
      color: #888;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      width: auto;
    }
    pre {
      background: #0d1117;
      border: 1px solid #2a2a35;
      border-left: 3px solid #e8613a;
      border-radius: 10px;
      padding: 16px;
      color: #c8ffc8;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 20px;
    }
    .explanation {
      background: #13131a;
      border: 1px solid #2a2a35;
      border-left: 3px solid #5b8dee;
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.8;
      color: #b0b8cc;
      white-space: pre-wrap;
    }
    .error-box {
      background: #1f0f0f;
      border: 1px solid #5a1a1a;
      border-radius: 8px;
      padding: 12px 14px;
      color: #ff8080;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .hint {
      text-align: center;
      font-size: 12px;
      color: #3a3a48;
      margin-top: 16px;
    }
    #results { display: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">⚙ Patchwork</div>
  <span class="badge">powered by Claude</span>
</header>

<main>
  <h1>Paste broken code.<br>Get it fixed.</h1>
  <p class="sub">Drop in your snippet and the error. Claude finds what's wrong, fixes it, and explains every change.</p>

  <label>Language</label>
  <select id="language">
    <option>Python</option>
    <option>JavaScript</option>
    <option>TypeScript</option>
    <option>Java</option>
    <option>C++</option>
    <option>C</option>
    <option>Go</option>
    <option>Rust</option>
    <option>Ruby</option>
    <option>PHP</option>
    <option>SQL</option>
    <option>Other</option>
  </select>

  <label>Your Code</label>
  <textarea id="codeInput" rows="10" placeholder="Paste your broken code here..."></textarea>

  <label>Error / Traceback <span style="font-weight:400;text-transform:none;color:#444">(optional)</span></label>
  <textarea id="errorInput" rows="4" placeholder="Paste the error message here..."></textarea>

  <div id="errorBox" class="error-box" style="display:none"></div>

  <button id="fixBtn" onclick="fixCode()">Fix my code →</button>

  <div id="results">
    <div class="divider"></div>

    <div class="result-label">
      <label style="margin:0">✓ Fixed Code</label>
      <button class="copy-btn" onclick="copyText('fixedCode', this)">Copy</button>
    </div>
    <pre id="fixedCode"></pre>

    <div class="result-label">
      <label style="margin:0">What changed & why</label>
      <button class="copy-btn" onclick="copyText('explanationBox', this)">Copy</button>
    </div>
    <div class="explanation" id="explanationBox"></div>

    <p class="hint">AI suggestions — review before running in production.</p>
  </div>
</main>

<script>
  async function fixCode() {
    const code = document.getElementById('codeInput').value.trim();
    const error = document.getElementById('errorInput').value.trim();
    const language = document.getElementById('language').value;
    const btn = document.getElementById('fixBtn');
    const errorBox = document.getElementById('errorBox');
    const results = document.getElementById('results');

    if (!code) return;

    btn.disabled = true;
    btn.textContent = 'Analyzing & fixing...';
    errorBox.style.display = 'none';
    results.style.display = 'none';

    try {
      const response = await fetch('/api/fix', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, language, error })
      });

      const data = await response.json();
      const text = data.content?.map(b => b.text || '').join('') || '';

      const fixedMatch = text.match(/<fixed_code>([\s\S]*?)<\/fixed_code>/);
      const explainMatch = text.match(/<explanation>([\s\S]*?)<\/explanation>/);

      if (fixedMatch && explainMatch) {
        document.getElementById('fixedCode').textContent = fixedMatch[1].trim();
        document.getElementById('explanationBox').textContent = explainMatch[1].trim();
        results.style.display = 'block';
        results.scrollIntoView({ behavior: 'smooth' });
      } else {
        errorBox.textContent = "⚠ Couldn't parse response. Try again.";
        errorBox.style.display = 'block';
      }
    } catch (e) {
      errorBox.textContent = '⚠ Network error — check your connection and try again.';
      errorBox.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = 'Fix my code →';
  }

  function copyText(id, btn) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text);
    btn.textContent = '✓ Copied!';
    btn.style.color = '#4ade80';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = '#888'; }, 2000);
  }
</script>

</body>
</html>
